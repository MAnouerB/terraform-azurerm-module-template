name: Bug report
description: Report a defect in the module
title: "[bug]: "
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much
        detail as possible so the issue can be reproduced and fixed.

  - type: input
    id: module-version
    attributes:
      label: Module version
      description: Version of this module you are using (SemVer tag or commit SHA)
      placeholder: "v0.2.0"
    validations:
      required: true

  - type: input
    id: terraform-version
    attributes:
      label: Terraform version
      description: Output of `terraform version`
      placeholder: "Terraform v1.9.8 on linux_amd64"
    validations:
      required: true

  - type: input
    id: azurerm-version
    attributes:
      label: azurerm provider version
      placeholder: "4.10.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: |
        A minimal Terraform snippet that reproduces the issue. Please
        redact any sensitive values (subscription IDs, secrets, etc.).
      render: hcl
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Terraform output
      description: |
        Relevant output from `terraform plan` or `terraform apply`. Redact
        sensitive values.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have redacted any sensitive information (subscription IDs, secrets, tokens)
          required: true